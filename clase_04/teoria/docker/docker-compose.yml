version: "3"

services:
  app:
    build: .
    image: clase36-users-creator
    container_name: clase36-app
    environment:
      PORT: 9090
      MONGO_URL: mongodb://mongodb:27017/clase36-containers-docker
    ports:
      - 9090:9090
    depends_on:
      - mongodb

  mongodb:
    image: mongo:4.2
    container_name: clase36-mongodb
    environment:
      MONGO_DATA_DIR: /data/db
      MONGO_LOG_DIR: /dev/log
    volumes:
      - mongodb-volume:/data/db
    ports:
      - 23017:27017

volumes:
  mongodb-volume:
